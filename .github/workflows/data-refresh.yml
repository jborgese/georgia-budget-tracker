name: Data refresh

on:
  schedule:
    # Daily at 09:17 UTC (~4:17 AM Eastern) — after typical business-hours publishing.
    - cron: "17 9 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

# ETL steps use continue-on-error so one failing source cannot block the
# others: each transform records its own success/failure counters in
# data/.source-state.json (via pipeline/runlog.py). The normalize step stays
# a hard gate — its contract failure blocks data/ from being committed — but
# the fingerprint/failure state is committed regardless, and the report step
# turns three consecutive failures of any source into a GitHub issue.

jobs:
  check-and-refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Detect upstream changes
        id: detect
        run: python pipeline/check_sources.py

      - name: Install ETL dependencies
        if: |
          contains(steps.detect.outputs.changed_sources, 'ted_rlgf_') ||
          contains(steps.detect.outputs.changed_sources, 'open_georgia_poa') ||
          contains(steps.detect.outputs.changed_sources, 'opb_governors_budget_report') ||
          contains(steps.detect.outputs.changed_sources, 'census_county_pop') ||
          contains(steps.detect.outputs.changed_sources, 'census_place_pop') ||
          contains(steps.detect.outputs.changed_sources, 'census_f33') ||
          contains(steps.detect.outputs.changed_sources, 'dor_digest')
        run: pip install -r pipeline/requirements.txt

      - name: Run RLGF county ETL
        id: rlgf
        continue-on-error: true
        if: contains(steps.detect.outputs.changed_sources, 'ted_rlgf_county_workbook')
        run: python pipeline/etl_rlgf.py county

      - name: Run RLGF city ETL
        id: rlgf_city
        continue-on-error: true
        if: contains(steps.detect.outputs.changed_sources, 'ted_rlgf_city_workbook')
        run: python pipeline/etl_rlgf.py city

      - name: Run RLGF consolidated ETL
        id: rlgf_consolidated
        continue-on-error: true
        if: contains(steps.detect.outputs.changed_sources, 'ted_rlgf_consolidated_workbook')
        run: python pipeline/etl_rlgf.py consolidated

      - name: Run state-level ETL
        id: state
        continue-on-error: true
        if: |
          contains(steps.detect.outputs.changed_sources, 'open_georgia_poa') ||
          contains(steps.detect.outputs.changed_sources, 'opb_governors_budget_report')
        run: python pipeline/etl_state.py ${{ steps.detect.outputs.changed_sources }}

      - name: Run census population ETL
        id: population
        continue-on-error: true
        if: |
          contains(steps.detect.outputs.changed_sources, 'census_county_pop') ||
          contains(steps.detect.outputs.changed_sources, 'census_place_pop')
        run: python pipeline/etl_population.py

      - name: Run school finances ETL
        id: schools
        continue-on-error: true
        if: contains(steps.detect.outputs.changed_sources, 'census_f33')
        run: python pipeline/etl_schools.py ${{ steps.detect.outputs.changed_sources }}

      - name: Run tax digest ETL
        id: digest
        continue-on-error: true
        if: contains(steps.detect.outputs.changed_sources, 'dor_digest')
        run: python pipeline/etl_digest.py ${{ steps.detect.outputs.changed_sources }}

      - name: Validate contract and normalize
        id: normalize
        if: |
          contains(steps.detect.outputs.changed_sources, 'ted_rlgf_') ||
          contains(steps.detect.outputs.changed_sources, 'open_georgia_poa') ||
          contains(steps.detect.outputs.changed_sources, 'opb_governors_budget_report') ||
          contains(steps.detect.outputs.changed_sources, 'census_county_pop') ||
          contains(steps.detect.outputs.changed_sources, 'census_place_pop') ||
          contains(steps.detect.outputs.changed_sources, 'census_f33') ||
          contains(steps.detect.outputs.changed_sources, 'dor_digest')
        run: python pipeline/normalize.py

      - name: Commit updated data
        if: always()
        run: |
          git config user.name "data-refresh-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/.source-state.json
          if [ "${{ steps.normalize.outcome }}" != "failure" ]; then
            git add data/
          else
            echo "Contract validation failed; committing fingerprint/failure state only."
          fi
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "data: refresh source state ($(date -u +%F))"
            git push
          fi

      - name: Report failing sources
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: python pipeline/report_failures.py

      - name: Fail the job if a transform failed
        if: |
          steps.rlgf.outcome == 'failure' ||
          steps.rlgf_city.outcome == 'failure' ||
          steps.rlgf_consolidated.outcome == 'failure' ||
          steps.state.outcome == 'failure' ||
          steps.population.outcome == 'failure' ||
          steps.schools.outcome == 'failure' ||
          steps.digest.outcome == 'failure'
        run: |
          echo "One or more transforms failed; see the steps above and the source-failure issue."
          exit 1
