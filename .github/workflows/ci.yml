name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pipeline/requirements*.txt

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt -r pipeline/requirements-dev.txt

      - name: Lint
        run: ruff check pipeline

      - name: Test
        run: pytest
